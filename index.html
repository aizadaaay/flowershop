<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Interactive 3D Particle System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            /* Запрещаем стандартные жесты браузера (например, свайп для обновления или прокрутку) */
            touch-action: none; 
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Setup Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. Create Particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 5000; // Number of particles
        
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i++) {
            // Spread particles over a wider area
            posArray[i] = (Math.random() - 0.5) * 10; 
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        // Create a custom material for the particles
        const material = new THREE.PointsMaterial({
            size: 0.025,
            color: 0x00ffff, // Cyan color
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        // Combine geometry and material into a Points object
        const particlesMesh = new THREE.Points(particlesGeometry, material);
        scene.add(particlesMesh);

        // Position camera
        camera.position.z = 3;

        // 3. Mouse and Touch Interaction Setup
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        let windowHalfX = window.innerWidth / 2;
        let windowHalfY = window.innerHeight / 2;

        // Обработка мыши (для ПК)
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // Обработка касаний (для мобильных телефонов)
        document.addEventListener('touchmove', (event) => {
            if (event.touches.length > 0) {
                mouseX = (event.touches[0].clientX - windowHalfX);
                mouseY = (event.touches[0].clientY - windowHalfY);
            }
        }, { passive: false });

        document.addEventListener('touchstart', (event) => {
            if (event.touches.length > 0) {
                mouseX = (event.touches[0].clientX - windowHalfX);
                mouseY = (event.touches[0].clientY - windowHalfY);
            }
        }, { passive: false });

        // Handle window resizing (адаптация при повороте экрана телефона)
        window.addEventListener('resize', () => {
            windowHalfX = window.innerWidth / 2;
            windowHalfY = window.innerHeight / 2;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 4. Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // Slowly rotate the entire particle system
            particlesMesh.rotation.y = elapsedTime * 0.1;
            particlesMesh.rotation.x = elapsedTime * 0.05;

            // Make particles react to mouse/touch movement (smooth interpolation)
            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;
            
            particlesMesh.rotation.y += 0.05 * (targetX - particlesMesh.rotation.y);
            particlesMesh.rotation.x += 0.05 * (targetY - particlesMesh.rotation.x);

            // Render the scene
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
