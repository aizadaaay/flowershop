<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✋ Hand Particle Universe 4.0 - PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(20, 20, 22, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(16px);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent: #00ffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050505;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            touch-action: none;
            user-select: none;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        #canvas-container { position: fixed; inset: 0; z-index: 1; }

        /* Общий класс для стеклянных панелей (Glassmorphism) */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* Верхний HUD */
        #hud {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 24px; display: flex;
            justify-content: space-between; align-items: flex-start;
            pointer-events: none; z-index: 10;
        }

        #hud-left {
            padding: 12px 24px;
            display: flex; align-items: center; justify-content: center;
        }

        #shape-name {
            font-size: clamp(16px, 3vw, 22px); 
            font-weight: 800;
            letter-spacing: 0.15em; 
            text-transform: uppercase;
            transition: color 0.6s, text-shadow 0.6s;
        }

        #hud-right {
            padding: 12px 20px;
            text-align: right;
        }

        #particle-count {
            font-size: 12px; font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.1em; line-height: 1.6;
        }
        
        #particle-count span { color: var(--text-main); font-weight: 800; }

        /* Экран загрузки */
        #overlay {
            position: fixed; inset: 0; background: #050505;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1); gap: 24px;
        }
        #overlay.hidden { opacity: 0; pointer-events: none; }

        .loader-ring {
            width: 48px; height: 48px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top-color: var(--accent); 
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #overlay-text {
            font-size: 13px; font-weight: 600; letter-spacing: 0.3em;
            text-transform: uppercase; color: var(--text-muted);
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse { 50% { opacity: 0.5; } }

        /* Превью камеры */
        #cam-preview {
            position: fixed; bottom: 24px; right: 24px;
            width: clamp(90px, 15vw, 140px); aspect-ratio: 4/3;
            border-radius: 16px; overflow: hidden;
            border: 1px solid var(--glass-border);
            opacity: 0.6; z-index: 10; transform: scaleX(-1);
            pointer-events: none; transition: opacity 0.3s;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        #cam-preview:hover { opacity: 1; }
        #cam-preview video { width: 100%; height: 100%; object-fit: cover; }

        /* Центральный Dock (Подсказки жестов) */
        #gesture-dock {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%);
            z-index: 10; pointer-events: none;
            display: flex; gap: 16px;
            padding: 12px 24px;
            flex-wrap: wrap; justify-content: center;
            max-width: 90vw;
        }
        
        .gesture-item {
            font-size: 12px; font-weight: 600; color: var(--text-muted);
            letter-spacing: 0.05em; display: flex; align-items: center; gap: 8px;
        }
        .gesture-icon { 
            font-size: 16px; background: rgba(255,255,255,0.1); 
            padding: 6px; border-radius: 8px; display: inline-flex;
        }

        /* Индикаторы форм (Справа по центру) */
        #shape-dots {
            position: fixed; top: 50%; right: 24px; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 12px; z-index: 10;
            padding: 12px 8px;
        }
        .dot {
            width: 4px; height: 16px; border-radius: 4px;
            background: rgba(255,255,255,0.15); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .dot.active {
            height: 32px; background: var(--text-main); 
            box-shadow: 0 0 12px rgba(255,255,255,0.8); 
        }

        /* Вспышка */
        #flash {
            position: fixed; inset: 0; background: #fff; opacity: 0;
            pointer-events: none; z-index: 50; transition: opacity 0.15s ease-out;
        }
        #flash.show { opacity: 0.1; transition: none; }

        /* Курсор-рука */
        #hand-cursor {
            position: fixed; width: 32px; height: 32px;
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.9);
            pointer-events: none; z-index: 20;
            transform: translate(-50%, -50%);
            transition: border-color 0.2s, transform 0.15s cubic-bezier(0.2, 0, 0.2, 1), box-shadow 0.2s, background-color 0.2s;
            mix-blend-mode: screen;
            box-shadow: 0 0 20px rgba(255,255,255,0.4), inset 0 0 10px rgba(255,255,255,0.2);
            transition-property: border-color, transform, box-shadow, left, top, background-color;
            transition-duration: 0.1s; 
        }
        #hand-cursor.pinching {
            border-color: #ff00ff; box-shadow: 0 0 30px #ff00ff;
            background-color: rgba(255,0,255,0.2);
            transform: translate(-50%, -50%) scale(0.5); border-width: 4px;
        }
        #hand-cursor.fist {
            border-color: #ff4444; box-shadow: 0 0 30px #ff4444;
            background-color: rgba(255,68,68,0.2);
            transform: translate(-50%, -50%) scale(1.3); border-radius: 12px;
        }

        /* Адаптив под мобильные устройства */
        @media (max-width: 768px) {
            #gesture-dock { bottom: 16px; padding: 12px; gap: 8px; border-radius: 12px; }
            .gesture-item { font-size: 10px; }
            .gesture-icon { font-size: 14px; padding: 4px; }
            #cam-preview { width: 80px; bottom: 80px; right: 16px; }
            #shape-dots { right: 12px; }
            #hud { padding: 16px; }
        }
    </style>
</head>
<body>

<div id="overlay">
    <div class="loader-ring"></div>
    <div id="overlay-text">Инициализация нейросети...</div>
</div>

<div id="flash"></div>
<div id="canvas-container"></div>

<div id="hud">
    <div id="hud-left" class="glass-panel">
        <div id="shape-name">ХАОС</div>
    </div>
    <div id="hud-right" class="glass-panel">
        <span id="fps-counter">60</span> FPS<br>
        <span id="p-count">0</span> ЧАСТИЦ
    </div>
</div>

<div id="hand-cursor"></div>

<div id="shape-dots" class="glass-panel"></div>

<div id="cam-preview">
    <video id="video-el" autoplay playsinline muted></video>
</div>

<div id="gesture-dock" class="glass-panel">
    <div class="gesture-item"><span class="gesture-icon">🖐</span> ОТТАЛКИВАНИЕ</div>
    <div class="gesture-item"><span class="gesture-icon">👐</span> МАСШТАБ</div>
    <div class="gesture-item"><span class="gesture-icon">🤏</span> СМЕНА ФОРМЫ</div>
    <div class="gesture-item"><span class="gesture-icon">✊</span> ВЗРЫВ</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ============================================================
// ОПТИМИЗИРОВАННЫЙ КОНФИГ
// ============================================================
const CONFIG = {
    PARTICLE_COUNT: window.innerWidth < 768 ? 2000 : 4500,
    LERP_MORPH: 0.06,
    LERP_ROTATION: 0.08,
    PINCH_THRESHOLD: 0.25, 
    FIST_THRESHOLD: 1.1, 
    PINCH_COOLDOWN: 1000,
    AUTO_ROTATE_SPEED: 0.1,
    REPULSION_RADIUS: 4.0,
    REPULSION_FORCE: 6.0,  
    HAND_SMOOTHING: 0.2
};

let targetPosY = 0; 
let targetScale = 1;
let currentScale = 1;

const targetHandWorldPos = new THREE.Vector3(999, 999, 999);
const handWorldPos = new THREE.Vector3(999, 999, 999);
let isRepelling = false;

// ГЕНЕРАТОРЫ ФОРМ
const SHAPES = [
    { name: 'ХАОС', color: 0x00ffff, gen: genRandom },
    { name: 'СФЕРА', color: 0x00ff88, gen: genSphere },
    { name: 'ГАЛАКТИКА', color: 0xff8800, gen: genGalaxy },
    { name: 'ТОРУС', color: 0xff00ff, gen: genTorus },
    { name: 'КУБ', color: 0xffff00, gen: genCube },
    { name: 'ДНК', color: 0x88aaff, gen: genDNA },
    { name: 'СЕРДЦЕ', color: 0xff2255, gen: genHeart },
];

let currentShape = 0;

function genRandom(n) { const a = new Float32Array(n*3); for(let i=0;i<n;i++){ a[i*3]=(Math.random()-0.5)*18; a[i*3+1]=(Math.random()-0.5)*18; a[i*3+2]=(Math.random()-0.5)*18; } return a; }
function genSphere(n) { const a = new Float32Array(n*3); const r=4.5; for(let i=0;i<n;i++){ const t=Math.random()*2*Math.PI, p=Math.acos(2*Math.random()-1), dr=r+(Math.random()-0.5)*0.3; a[i*3]=dr*Math.sin(p)*Math.cos(t); a[i*3+1]=dr*Math.sin(p)*Math.sin(t); a[i*3+2]=dr*Math.cos(p); } return a; }
function genGalaxy(n) { 
    const a = new Float32Array(n*3); const arms = 3; const spin = 1.6; 
    for(let i=0; i<n; i++){ 
        const r = Math.pow(Math.random(), 1.8) * 6.5; 
        const branchAngle = (i % arms) * ((2 * Math.PI) / arms);
        const angle = branchAngle + r * spin;
        const scatter = 0.1 + (r * 0.15);
        a[i*3] = Math.cos(angle) * r + (Math.random() - 0.5) * scatter; 
        a[i*3+1] = (Math.random() - 0.5) * (scatter * 0.3) + (Math.random()-0.5)*0.2; 
        a[i*3+2] = Math.sin(angle) * r + (Math.random() - 0.5) * scatter; 
    } return a; 
}
function genTorus(n) { const a = new Float32Array(n*3); const R=3.5, r=1.2; for(let i=0;i<n;i++){ const u=Math.random()*2*Math.PI, v=Math.random()*2*Math.PI, nz=(Math.random()-0.5)*0.2; a[i*3]=(R+r*Math.cos(v))*Math.cos(u)+nz; a[i*3+1]=(R+r*Math.cos(v))*Math.sin(u)+nz; a[i*3+2]=r*Math.sin(v)+nz; } return a; }
function genCube(n) { const a = new Float32Array(n*3); const s=3.5; for(let i=0;i<n;i++){ const f=Math.floor(Math.random()*6); let x,y,z; const u=(Math.random()-0.5)*s*2, v=(Math.random()-0.5)*s*2; if(f===0){x=s;y=u;z=v;}else if(f===1){x=-s;y=u;z=v;}else if(f===2){x=u;y=s;z=v;}else if(f===3){x=u;y=-s;z=v;}else if(f===4){x=u;y=v;z=s;}else{x=u;y=v;z=-s;} a[i*3]=x;a[i*3+1]=y;a[i*3+2]=z; } return a; }
function genDNA(n) { const a = new Float32Array(n*3); for(let i=0;i<n;i++){ const t=(i/n)*Math.PI*8, st=i%2, off=st*Math.PI, r=1.5+(Math.random()-0.5)*0.2, y=(t/(Math.PI*8))*10-5; a[i*3]=Math.cos(t+off)*r; a[i*3+1]=y; a[i*3+2]=Math.sin(t+off)*r; } return a; }
function genHeart(n) { const a = new Float32Array(n*3); for(let i=0;i<n;i++){ const t=(Math.random()*2-1)*Math.PI, sc=0.9; const x=16*Math.pow(Math.sin(t),3), y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t), z=(Math.random()-0.5)*2; a[i*3]=x*sc*0.25; a[i*3+1]=y*sc*0.25; a[i*3+2]=z; } return a; }

// ИНИЦИАЛИЗАЦИЯ THREE.JS
const scene = new THREE.Scene();
// Добавляем легкий туман для глубины
scene.fog = new THREE.FogExp2(0x050505, 0.02);

const camThree = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
function updateCameraPosition() { camThree.position.z = window.innerWidth < 768 ? 14 : 9; }
updateCameraPosition();

const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: "high-performance" });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

function createCircleTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 32; canvas.height = 32;
    const context = canvas.getContext('2d');
    const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
    gradient.addColorStop(0, 'rgba(255,255,255,1)');
    gradient.addColorStop(0.5, 'rgba(255,255,255,0.8)');
    gradient.addColorStop(1, 'rgba(255,255,255,0)');
    context.fillStyle = gradient;
    context.fillRect(0, 0, 32, 32);
    return new THREE.CanvasTexture(canvas);
}

const N = CONFIG.PARTICLE_COUNT;
document.getElementById('p-count').textContent = N;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(N * 3);
const col = new Float32Array(N * 3);
const target = new Float32Array(N * 3);
const velocity = new Float32Array(N * 3);

const initPos = genRandom(N);
for (let i = 0; i < pos.length; i++) { pos[i] = initPos[i]; target[i] = initPos[i]; }

geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

function updateColors(hex) {
    const c = new THREE.Color(hex);
    for (let i = 0; i < N; i++) {
        const noise = 0.6 + Math.random() * 0.4;
        col[i*3] = c.r * noise; col[i*3+1] = c.g * noise; col[i*3+2] = c.b * noise;
    }
    geo.attributes.color.needsUpdate = true;
}

updateColors(0x00ffff);

const mat = new THREE.PointsMaterial({
    size: window.innerWidth < 768 ? 0.2 : 0.15, 
    map: createCircleTexture(),
    vertexColors: true, 
    transparent: true, 
    opacity: 0.9,
    blending: THREE.AdditiveBlending, 
    depthWrite: false,
});

const particles = new THREE.Points(geo, mat);
scene.add(particles);

// ЛОГИКА ИНТЕРФЕЙСА
function setShape(idx) {
    const shape = SHAPES[idx];
    const newPos = shape.gen(N);
    for (let i = 0; i < target.length; i++) target[i] = newPos[i];

    document.getElementById('shape-name').textContent = shape.name;
    document.getElementById('shape-name').style.color = `#${shape.color.toString(16).padStart(6,'0')}`;
    document.getElementById('shape-name').style.textShadow = `0 0 20px rgba(${shape.color >> 16 & 255}, ${shape.color >> 8 & 255}, ${shape.color & 255}, 0.6)`;

    updateColors(shape.color);
    updateDots(idx);

    const flash = document.getElementById('flash');
    flash.classList.add('show');
    requestAnimationFrame(() => setTimeout(() => flash.classList.remove('show'), 100));
}

const dotsContainer = document.getElementById('shape-dots');
SHAPES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsContainer.appendChild(d);
});

function updateDots(idx) {
    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

let rotX = 0, rotY = 0;
let handDetected = false;
let isExploding = false;
let lastClickTime = 0;

// Управление мышью
window.addEventListener('pointermove', (e) => {
    if (handDetected) return; 
    const nx = (e.clientX / innerWidth - 0.5) * 2;
    const ny = -(e.clientY / innerHeight - 0.5) * 2;
    rotX = ny * 1.5;
    rotY = nx * 1.5;
    
    const vec = new THREE.Vector3(nx, ny, 0.5);
    vec.unproject(camThree);
    const dir = vec.sub(camThree.position).normalize();
    const distance = -camThree.position.z / dir.z;
    
    targetHandWorldPos.copy(camThree.position).add(dir.multiplyScalar(distance));
    isRepelling = true;

    handCursor.style.left = e.clientX + 'px';
    handCursor.style.top = e.clientY + 'px';
    handCursor.style.opacity = '1';
});

window.addEventListener('pointerleave', () => { isRepelling = false; handCursor.style.opacity = '0'; });
window.addEventListener('pointerdown', (e) => {
    if (handDetected || isExploding) return;
    const now = Date.now();
    if (now - lastClickTime < 300) { triggerExplosion(); } 
    else { currentShape = (currentShape + 1) % SHAPES.length; setShape(currentShape); }
    lastClickTime = now;
});

// УПРАВЛЕНИЕ РУКОЙ (MEDIAPIPE)
function getDistance3D(p1, p2) {
    return Math.sqrt((p1.x-p2.x)**2 + (p1.y-p2.y)**2 + (p1.z-p2.z)**2);
}

let pinching = false, lastPinch = 0;
const handCursor = document.getElementById('hand-cursor');
const videoEl = document.getElementById('video-el');
const overlayEl = document.getElementById('overlay');
let handReady = false;

const handsMP = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
handsMP.setOptions({
    maxNumHands: 2,
    modelComplexity: window.innerWidth < 768 ? 0 : 1,
    minDetectionConfidence: 0.65,
    minTrackingConfidence: 0.65,
});

handsMP.onResults(results => {
    if (!handReady) {
        handReady = true;
        overlayEl.classList.add('hidden');
    }

    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        handDetected = false;
        isRepelling = false;
        handCursor.style.opacity = '0';
        targetPosY = 0;
        targetScale = 1;
        return;
    }

    handDetected = true;
    const lm = results.multiHandLandmarks[0]; 
    const wrist = lm[0];
    const middleBase = lm[9]; 
    const handSize = getDistance3D(wrist, middleBase);

    const nx = (1 - middleBase.x - 0.5) * 2;
    const ny = -(middleBase.y - 0.5) * 2;
    rotX = ny * 2.5;
    rotY = nx * 2.5;
    targetPosY = (middleBase.y - 0.5) * 12.0; 

    handCursor.style.left = ((1 - middleBase.x) * innerWidth) + 'px';
    handCursor.style.top = (middleBase.y * innerHeight) + 'px';
    handCursor.style.opacity = '1';

    const vec = new THREE.Vector3(nx, ny, 0.5);
    vec.unproject(camThree);
    const dir = vec.sub(camThree.position).normalize();
    const distance = -camThree.position.z / dir.z;
    
    targetHandWorldPos.copy(camThree.position).add(dir.multiplyScalar(distance));

    const pinchDist = getDistance3D(lm[4], lm[8]); 
    const pinchRatio = pinchDist / handSize;
    const now = Date.now();

    const isFist = (
        getDistance3D(lm[8], wrist)/handSize < CONFIG.FIST_THRESHOLD && 
        getDistance3D(lm[12], wrist)/handSize < CONFIG.FIST_THRESHOLD && 
        getDistance3D(lm[16], wrist)/handSize < CONFIG.FIST_THRESHOLD && 
        getDistance3D(lm[20], wrist)/handSize < CONFIG.FIST_THRESHOLD
    );

    if (pinchRatio < CONFIG.PINCH_THRESHOLD) {
        handCursor.classList.add('pinching');
        handCursor.classList.remove('fist');
        isRepelling = false; 
        if (!pinching && now - lastPinch > CONFIG.PINCH_COOLDOWN && !isExploding) {
            pinching = true; lastPinch = now;
            currentShape = (currentShape + 1) % SHAPES.length; setShape(currentShape);
        }
    } else {
        pinching = false; handCursor.classList.remove('pinching');
    }

    if (isFist) {
        handCursor.classList.add('fist');
        isRepelling = false; 
        if (!isExploding) triggerExplosion();
    } else {
        handCursor.classList.remove('fist');
    }

    if (!pinching && !isFist) isRepelling = true;

    if (results.multiHandLandmarks.length === 2) {
        const dx = results.multiHandLandmarks[0][0].x - results.multiHandLandmarks[1][0].x;
        const dy = results.multiHandLandmarks[0][0].y - results.multiHandLandmarks[1][0].y;
        targetScale = Math.max(0.4, Math.min(0.4 + (Math.sqrt(dx*dx + dy*dy) * 2.5), 3.0));
    } else {
        targetScale = 1.0; 
    }
});

async function startCamera() {
    try {
        const cameraMP = new Camera(videoEl, {
            onFrame: async () => { await handsMP.send({ image: videoEl }); },
            width: 640, height: 480
        });
        await cameraMP.start();
        document.getElementById('overlay-text').textContent = 'ОЖИДАНИЕ РУКИ...';
    } catch(e) {
        overlayEl.classList.add('hidden');
        document.getElementById('cam-preview').style.display = 'none';
    }
}
startCamera();

// ЭФФЕКТ ВЗРЫВА 
function triggerExplosion() {
    isExploding = true;
    for (let i = 0; i < N; i++) {
        const angle = Math.random() * Math.PI * 2;
        const elev = (Math.random()-0.5) * Math.PI;
        const speed = 2.0 + Math.random() * 3.0; 
        velocity[i*3] = Math.cos(angle)*Math.cos(elev)*speed;
        velocity[i*3+1] = Math.sin(elev)*speed;
        velocity[i*3+2] = Math.sin(angle)*Math.cos(elev)*speed;
    }
    updateColors(0xff4400);

    setTimeout(() => {
        isExploding = false;
        updateColors(SHAPES[currentShape].color);
        const s = SHAPES[currentShape].gen(N);
        for (let i = 0; i < target.length; i++) target[i] = s[i];
    }, 1500);
}

// АНИМАЦИЯ И РЕНДЕР 
const clock = new THREE.Clock();
let frames = 0, fpsTime = 0;

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    frames++; fpsTime += delta;
    if (fpsTime >= 1) { document.getElementById('fps-counter').textContent = frames; frames = 0; fpsTime = 0; }

    handWorldPos.lerp(targetHandWorldPos, CONFIG.HAND_SMOOTHING);

    particles.rotation.x += (rotX - particles.rotation.x) * CONFIG.LERP_ROTATION;
    particles.rotation.y += (rotY - particles.rotation.y) * CONFIG.LERP_ROTATION;
    particles.rotation.z = elapsed * CONFIG.AUTO_ROTATE_SPEED * (handDetected ? 0.2 : 1);

    particles.position.y += (targetPosY - particles.position.y) * 0.08;
    currentScale += (targetScale - currentScale) * 0.08;
    particles.scale.set(currentScale, currentScale, currentScale);

    const pArr = geo.attributes.position.array;
    const localHandPos = handWorldPos.clone();
    particles.worldToLocal(localHandPos);

    const time = elapsed * 1.2; 
    const radSq = CONFIG.REPULSION_RADIUS * CONFIG.REPULSION_RADIUS;
    const lX = localHandPos.x, lY = localHandPos.y, lZ = localHandPos.z;
    const repForce = CONFIG.REPULSION_FORCE;
    const repRad = CONFIG.REPULSION_RADIUS;
    const lerpM = CONFIG.LERP_MORPH;

    if (isExploding) {
        for (let i = 0; i < N; i++) {
            const idx3 = i * 3;
            pArr[idx3]   += velocity[idx3] * delta * 20;
            pArr[idx3+1] += velocity[idx3+1] * delta * 20;
            pArr[idx3+2] += velocity[idx3+2] * delta * 20;
            velocity[idx3]   *= 0.92;
            velocity[idx3+1] *= 0.92;
            velocity[idx3+2] *= 0.92;
        }
    } else {
        for (let i = 0; i < N; i++) {
            const idx3 = i * 3;
            const offsetX = Math.sin(time + i * 0.05) * 0.15;
            const offsetY = Math.cos(time + i * 0.05) * 0.15;
            const offsetZ = Math.sin(time + i * 0.03) * 0.15;

            let tx = target[idx3]   + offsetX;
            let ty = target[idx3+1] + offsetY;
            let tz = target[idx3+2] + offsetZ;

            if (isRepelling) {
                const dx = pArr[idx3] - lX;
                const dy = pArr[idx3+1] - lY;
                const dz = pArr[idx3+2] - lZ;
                const distSq = dx*dx + dy*dy + dz*dz;

                if (distSq < radSq) {
                    const dist = Math.sqrt(distSq);
                    const force = (repRad - dist) / repRad;
                    tx += (dx / dist) * force * repForce;
                    ty += (dy / dist) * force * repForce;
                    tz += (dz / dist) * force * repForce;
                }
            }

            pArr[idx3]   += (tx - pArr[idx3])   * lerpM;
            pArr[idx3+1] += (ty - pArr[idx3+1]) * lerpM;
            pArr[idx3+2] += (tz - pArr[idx3+2]) * lerpM;
        }
    }
    geo.attributes.position.needsUpdate = true;

    renderer.render(scene, camThree);
}

window.addEventListener('resize', () => {
    updateCameraPosition();
    camThree.aspect = innerWidth / innerHeight;
    camThree.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
