<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✋ Particle Universe 5.0 - CINEMATIC PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(10, 10, 12, 0.25);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-blur: blur(20px);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent: #00e5ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #020202;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            user-select: none;
        }

        #canvas-container { position: fixed; inset: 0; z-index: 1; }

        /* Утонченный Premium UI */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        #hud {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 30px; display: flex;
            justify-content: space-between; align-items: flex-start;
            pointer-events: none; z-index: 10;
        }

        #shape-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px; font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            padding: 12px 24px;
            transition: color 0.4s, text-shadow 0.4s;
        }

        #controls-right {
            display: flex; flex-direction: column; gap: 12px; align-items: flex-end;
            pointer-events: auto;
        }

        .stats-panel { padding: 12px 20px; text-align: right; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; color: var(--text-muted); }
        .stats-panel span { color: var(--text-main); font-weight: 700; }

        /* Кнопка микрофона */
        #mic-btn {
            padding: 12px 20px; cursor: pointer; color: var(--text-muted);
            font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
            transition: all 0.3s ease; border: 1px solid var(--glass-border);
        }
        #mic-btn:hover { color: var(--accent); border-color: var(--accent); }
        #mic-btn.active { background: rgba(0, 229, 255, 0.1); color: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }

        /* Превью камеры */
        #cam-preview {
            position: fixed; bottom: 30px; right: 30px;
            width: 120px; aspect-ratio: 4/3;
            border-radius: 8px; overflow: hidden;
            border: 1px solid var(--glass-border);
            opacity: 0.3; z-index: 10; transform: scaleX(-1);
            transition: opacity 0.4s;
        }
        #cam-preview:hover { opacity: 0.8; }
        #cam-preview video { width: 100%; height: 100%; object-fit: cover; }

        /* Центральный минималистичный Dock */
        #gesture-dock {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%); z-index: 10;
            display: flex; gap: 2px; padding: 4px; border-radius: 8px;
        }
        .gesture-item {
            font-size: 10px; font-weight: 500; color: var(--text-muted);
            letter-spacing: 0.05em; padding: 8px 16px;
            display: flex; align-items: center; gap: 8px; border-radius: 6px;
        }
        .gesture-item span { font-size: 14px; opacity: 0.8; }

        /* Индикаторы справа */
        #shape-dots {
            position: fixed; top: 50%; right: 30px; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 8px; z-index: 10;
        }
        .dot {
            width: 2px; height: 12px; background: rgba(255,255,255,0.1); 
            transition: all 0.4s ease;
        }
        .dot.active { height: 24px; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* Экран загрузки */
        #overlay {
            position: fixed; inset: 0; background: #020202;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 1s ease; gap: 20px;
        }
        #overlay.hidden { opacity: 0; pointer-events: none; }
        .loader { width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #overlay-text { font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 0.4em; color: var(--text-muted); animation: pulse 2s infinite; }
        @keyframes pulse { 50% { opacity: 0.3; } }

        #time-freeze-fx { position: fixed; inset: 0; box-shadow: inset 0 0 150px rgba(0,255,255,0); pointer-events: none; z-index: 50; transition: box-shadow 0.3s; }
        #time-freeze-fx.active { box-shadow: inset 0 0 150px rgba(0,255,255,0.2); }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.0/examples/jsm/"
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
</head>
<body>

<div id="overlay">
    <div class="loader"></div>
    <div id="overlay-text">СИНХРОНИЗАЦИЯ...</div>
</div>

<div id="time-freeze-fx"></div>
<div id="canvas-container"></div>

<div id="hud">
    <div id="shape-name" class="glass-panel">ХАОС</div>
    <div id="controls-right">
        <div class="stats-panel glass-panel">
            <span id="fps-counter">60</span> FPS<br>
            <span id="p-count">0</span> ЧАСТИЦ
        </div>
        <div id="mic-btn" class="glass-panel">🎤 Аудио-вход</div>
    </div>
</div>

<div id="shape-dots"></div>

<div id="cam-preview">
    <video id="video-el" autoplay playsinline muted></video>
</div>

<div id="gesture-dock" class="glass-panel">
    <div class="gesture-item"><span>🖐</span> ОТТАЛКИВАНИЕ</div>
    <div class="gesture-item"><span>✌️</span> ЗАМОРОЗКА (PEACE)</div>
    <div class="gesture-item"><span>👌</span> СМЕНА ЦВЕТА (OK)</div>
    <div class="gesture-item"><span>✊</span> ВЗРЫВ</div>
</div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ==========================================
// 1. АУДИО-РЕАКТИВНОСТЬ
// ==========================================
let audioCtx, analyser, dataArray;
let audioEnabled = false;
let currentBass = 0;

document.getElementById('mic-btn').addEventListener('click', async (e) => {
    if (!audioEnabled) {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            audioEnabled = true;
            e.target.classList.add('active');
            e.target.innerText = '🔊 АУДИО АКТИВНО';
        } catch (err) { alert('Ошибка доступа к микрофону'); }
    }
});

// ==========================================
// 2. ГЕНЕРАТОРЫ ФОРМ И ТЕКСТА
// ==========================================
const CONFIG = {
    PARTICLE_COUNT: 3000,
    LERP_MORPH: 0.04,
    REPULSION_RADIUS: 4.5,
    REPULSION_FORCE: 8.0, 
    NOISE_STRENGTH: 0.5 // Сила завихрений (Flow Fields)
};

// Функция для генерации координат из текста
function genText(n, text="CYBER") {
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,256,128);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 64px Orbitron, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(text, 128, 64);
    
    const data = ctx.getImageData(0,0,256,128).data;
    const points = [];
    for(let y=0; y<128; y+=2){
        for(let x=0; x<256; x+=2){
            if(data[(y*256+x)*4] > 128) points.push({x: (x-128)*0.08, y: -(y-64)*0.08});
        }
    }
    const a = new Float32Array(n*3);
    for(let i=0; i<n; i++) {
        const p = points[Math.floor(Math.random()*points.length)];
        a[i*3] = p.x + (Math.random()-0.5)*0.15;
        a[i*3+1] = p.y + (Math.random()-0.5)*0.15;
        a[i*3+2] = (Math.random()-0.5)*0.5;
    }
    return a;
}

function genRandom(n) { const a = new Float32Array(n*3); for(let i=0;i<n;i++){ a[i*3]=(Math.random()-0.5)*18; a[i*3+1]=(Math.random()-0.5)*18; a[i*3+2]=(Math.random()-0.5)*18; } return a; }
function genSphere(n) { const a = new Float32Array(n*3); const r=4.5; for(let i=0;i<n;i++){ const t=Math.random()*2*Math.PI, p=Math.acos(2*Math.random()-1), dr=r+(Math.random()-0.5)*0.3; a[i*3]=dr*Math.sin(p)*Math.cos(t); a[i*3+1]=dr*Math.sin(p)*Math.sin(t); a[i*3+2]=dr*Math.cos(p); } return a; }

const SHAPES = [
    { name: 'ХАОС', color: 0x00e5ff, gen: genRandom },
    { name: 'СФЕРА', color: 0xff0055, gen: genSphere },
    { name: 'ТЕКСТ', color: 0xffaa00, gen: (n) => genText(n, "CYBER") }, // ИНТЕРАКТИВНЫЙ ТЕКСТ
];

let currentShape = 0;
const simplex = new SimplexNoise(); // Для Flow Fields

// ==========================================
// 3. ИНИЦИАЛИЗАЦИЯ THREE.JS И POST-PROCESSING
// ==========================================
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020202, 0.03);

const camThree = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camThree.position.z = 10;

const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false, powerPreference: "high-performance" });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ReinhardToneMapping;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Kинематографичный Bloom
const renderScene = new RenderPass(scene, camThree);
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.4, 0.85);
bloomPass.threshold = 0.1;
bloomPass.strength = 1.2; // Сила свечения
bloomPass.radius = 0.5;

const composer = new EffectComposer(renderer);
composer.addPass(renderScene);
composer.addPass(bloomPass);

// ==========================================
// ЧАСТИЦЫ
// ==========================================
const N = CONFIG.PARTICLE_COUNT;
document.getElementById('p-count').textContent = N;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(N * 3);
const col = new Float32Array(N * 3);
const target = new Float32Array(N * 3);
const velocity = new Float32Array(N * 3); // Для физики взрыва

const initPos = genRandom(N);
for (let i = 0; i < pos.length; i++) { pos[i] = initPos[i]; target[i] = initPos[i]; }

geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

function updateColors(hex) {
    const c = new THREE.Color(hex);
    document.documentElement.style.setProperty('--accent', `#${c.getHexString()}`);
    for (let i = 0; i < N; i++) {
        const noise = 0.5 + Math.random() * 0.5;
        col[i*3] = c.r * noise; col[i*3+1] = c.g * noise; col[i*3+2] = c.b * noise;
    }
    geo.attributes.color.needsUpdate = true;
}
updateColors(SHAPES[0].color);

const mat = new THREE.PointsMaterial({
    size: 0.12,
    vertexColors: true,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
});

const particles = new THREE.Points(geo, mat);
scene.add(particles);

// UI Индикаторы
const dotsContainer = document.getElementById('shape-dots');
SHAPES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsContainer.appendChild(d);
});

function setShape(idx) {
    const shape = SHAPES[idx];
    const newPos = shape.gen(N);
    for (let i = 0; i < target.length; i++) target[i] = newPos[i];

    const title = document.getElementById('shape-name');
    title.textContent = shape.name;
    title.style.color = `#${shape.color.toString(16).padStart(6,'0')}`;
    
    updateColors(shape.color);
    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

// ==========================================
// 4. ML МАГИЯ: УМНЫЕ ЖЕСТЫ И MEDIAPIPE
// ==========================================
const videoEl = document.getElementById('video-el');
let handWorldPos = new THREE.Vector3(999,999,999);
let isRepelling = false;
let isTimeFrozen = false;
let isExploding = false;
let lastColorChange = 0;

const handsMP = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
handsMP.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.65 });

function getDist(p1, p2) { return Math.sqrt((p1.x-p2.x)**2 + (p1.y-p2.y)**2); }

handsMP.onResults(results => {
    document.getElementById('overlay').classList.add('hidden');
    
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        isRepelling = false; isTimeFrozen = false;
        document.getElementById('time-freeze-fx').classList.remove('active');
        return;
    }

    const lm = results.multiHandLandmarks[0];
    const wrist = lm[0];
    const palm = lm[9];
    
    // Проекция руки в 3D
    const nx = (1 - palm.x - 0.5) * 2;
    const ny = -(palm.y - 0.5) * 2;
    const vec = new THREE.Vector3(nx, ny, 0.5).unproject(camThree);
    const dir = vec.sub(camThree.position).normalize();
    handWorldPos.copy(camThree.position).add(dir.multiplyScalar(10));

    // АНАЛИЗ ЖЕСТОВ (ML Magic)
    
    // 1. Жест "PEACE" ✌️ (Заморозка времени)
    // Указательный(8) и Средний(12) вытянуты (выше суставов 6 и 10). Безымянный(16) и Мизинец(20) согнуты.
    const isPeace = lm[8].y < lm[6].y && lm[12].y < lm[10].y && lm[16].y > lm[14].y && lm[20].y > lm[18].y;
    
    // 2. Жест "OK" 👌 (Смена цвета)
    // Большой(4) и Указательный(8) касаются
    const isOK = getDist(lm[4], lm[8]) < 0.05 && lm[12].y < lm[10].y;

    // 3. Жест "КУЛАК" ✊ (Взрыв)
    const isFist = lm[8].y > lm[6].y && lm[12].y > lm[10].y && lm[16].y > lm[14].y;

    const freezeFx = document.getElementById('time-freeze-fx');
    
    if (isPeace) {
        isTimeFrozen = true;
        isRepelling = false;
        freezeFx.classList.add('active');
    } else {
        isTimeFrozen = false;
        freezeFx.classList.remove('active');
        isRepelling = !isFist && !isOK; // Отталкиваем, если ладонь открыта
    }

    const now = Date.now();
    if (isOK && now - lastColorChange > 1000) {
        lastColorChange = now;
        currentShape = (currentShape + 1) % SHAPES.length; 
        setShape(currentShape);
    }

    if (isFist && !isExploding) {
        triggerExplosion();
    }
});

const cameraMP = new Camera(videoEl, { onFrame: async () => { await handsMP.send({ image: videoEl }); }, width: 640, height: 480 });
cameraMP.start();

function triggerExplosion() {
    isExploding = true;
    for (let i = 0; i < N; i++) {
        const angle = Math.random() * Math.PI * 2;
        const elev = (Math.random()-0.5) * Math.PI;
        const speed = 2.0 + Math.random() * 5.0; 
        velocity[i*3] = Math.cos(angle)*Math.cos(elev)*speed;
        velocity[i*3+1] = Math.sin(elev)*speed;
        velocity[i*3+2] = Math.sin(angle)*Math.cos(elev)*speed;
    }
    setTimeout(() => {
        isExploding = false;
        const s = SHAPES[currentShape].gen(N);
        for (let i = 0; i < target.length; i++) target[i] = s[i];
    }, 1000);
}

// Управление мышкой (если нет камеры)
window.addEventListener('pointermove', (e) => {
    if(document.getElementById('overlay').classList.contains('hidden')) return; // Если камера работает, мышь игнорим
    const nx = (e.clientX / innerWidth - 0.5) * 2;
    const ny = -(e.clientY / innerHeight - 0.5) * 2;
    const vec = new THREE.Vector3(nx, ny, 0.5).unproject(camThree);
    handWorldPos.copy(camThree.position).add(vec.sub(camThree.position).normalize().multiplyScalar(10));
    isRepelling = true;
});
window.addEventListener('click', () => { 
    if(document.getElementById('overlay').classList.contains('hidden')) return;
    currentShape = (currentShape + 1) % SHAPES.length; setShape(currentShape); 
});

// ==========================================
// 5. ГЛАВНЫЙ ЦИКЛ АНИМАЦИИ (Flow Fields + Audio)
// ==========================================
const clock = new THREE.Clock();
let frames = 0, fpsTime = 0;

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const time = clock.getElapsedTime();

    // Счётчик FPS
    frames++; fpsTime += delta;
    if (fpsTime >= 1) { document.getElementById('fps-counter').textContent = frames; frames = 0; fpsTime = 0; }

    // Аудио-реактивность
    if (audioEnabled && analyser) {
        analyser.getByteFrequencyData(dataArray);
        currentBass = dataArray[0] / 255.0; // Нормализуем бас от 0 до 1
        mat.size = 0.12 + currentBass * 0.15; // Частицы увеличиваются от бита
        bloomPass.strength = 1.2 + currentBass * 1.5; // Свечение пульсирует
    }

    const pArr = geo.attributes.position.array;
    const lerpM = isTimeFrozen ? 0 : CONFIG.LERP_MORPH; // Заморозка времени
    const noiseSpeed = time * 0.2;

    if (isExploding) {
        for (let i = 0; i < N; i++) {
            const i3 = i * 3;
            pArr[i3] += velocity[i3] * delta * 15;
            pArr[i3+1] += velocity[i3+1] * delta * 15;
            pArr[i3+2] += velocity[i3+2] * delta * 15;
            velocity[i3] *= 0.9; velocity[i3+1] *= 0.9; velocity[i3+2] *= 0.9;
        }
    } else {
        for (let i = 0; i < N; i++) {
            const i3 = i * 3;
            let tx = target[i3]; let ty = target[i3+1]; let tz = target[i3+2];

            // Имитация жидкости (Flow Fields / Perlin Noise)
            if (!isTimeFrozen) {
                tx += simplex.noise3D(tx * 0.2, ty * 0.2, noiseSpeed) * CONFIG.NOISE_STRENGTH;
                ty += simplex.noise3D(ty * 0.2, tz * 0.2, noiseSpeed) * CONFIG.NOISE_STRENGTH;
                tz += simplex.noise3D(tz * 0.2, tx * 0.2, noiseSpeed) * CONFIG.NOISE_STRENGTH;
            }

            // Физика отталкивания
            if (isRepelling && !isTimeFrozen) {
                const dx = pArr[i3] - handWorldPos.x;
                const dy = pArr[i3+1] - handWorldPos.y;
                const dz = pArr[i3+2] - handWorldPos.z;
                const distSq = dx*dx + dy*dy + dz*dz;

                if (distSq < (CONFIG.REPULSION_RADIUS**2)) {
                    const dist = Math.sqrt(distSq);
                    const force = (CONFIG.REPULSION_RADIUS - dist) / CONFIG.REPULSION_RADIUS;
                    tx += (dx / dist) * force * CONFIG.REPULSION_FORCE;
                    ty += (dy / dist) * force * CONFIG.REPULSION_FORCE;
                    tz += (dz / dist) * force * CONFIG.REPULSION_FORCE;
                }
            }

            pArr[i3] += (tx - pArr[i3]) * lerpM;
            pArr[i3+1] += (ty - pArr[i3+1]) * lerpM;
            pArr[i3+2] += (tz - pArr[i3+2]) * lerpM;
        }
    }
    geo.attributes.position.needsUpdate = true;

    // Вращение сцены
    if (!isTimeFrozen) {
        particles.rotation.y = Math.sin(time * 0.1) * 0.5;
        particles.rotation.x = Math.cos(time * 0.1) * 0.2;
    }

    composer.render(); // Используем EffectComposer для свечения
}

window.addEventListener('resize', () => {
    camThree.aspect = innerWidth / innerHeight;
    camThree.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
});

animate();
</script>
</body>
</html>
