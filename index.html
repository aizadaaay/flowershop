<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✋ Hand Particle Universe 5.0 - ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(10, 10, 12, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(20px);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --accent: #00ffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #020202;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            touch-action: none; user-select: none; color: var(--text-main);
        }

        #canvas-container { position: fixed; inset: 0; z-index: 1; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        #hud {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 24px; display: flex; justify-content: space-between;
            align-items: flex-start; pointer-events: none; z-index: 10;
        }

        #hud-left { padding: 12px 24px; display: flex; align-items: center; justify-content: center; }
        
        #shape-name {
            font-size: clamp(16px, 3vw, 22px); 
            font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase;
            transition: color 0.6s, text-shadow 0.6s;
        }

        #hud-right { padding: 12px 20px; text-align: right; pointer-events: auto; }
        
        .stats { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.1em; line-height: 1.6; }
        .stats span { color: var(--text-main); font-weight: 800; }

        /* Кнопка Аудио */
        #audio-btn {
            margin-top: 12px; background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3); color: #00ffff;
            padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 800;
            cursor: pointer; transition: all 0.3s; pointer-events: auto;
        }
        #audio-btn:hover { background: rgba(0, 255, 255, 0.3); box-shadow: 0 0 15px rgba(0,255,255,0.4); }
        #audio-btn.active { background: #00ffff; color: #000; }

        #overlay {
            position: fixed; inset: 0; background: #020202;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.8s; gap: 24px;
        }
        #overlay.hidden { opacity: 0; pointer-events: none; }

        .loader-ring {
            width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.05);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s infinite; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #cam-preview {
            position: fixed; bottom: 24px; right: 24px;
            width: 140px; aspect-ratio: 4/3; border-radius: 16px; overflow: hidden;
            border: 1px solid var(--glass-border); opacity: 0.6; z-index: 10;
            transform: scaleX(-1); pointer-events: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        #cam-preview video { width: 100%; height: 100%; object-fit: cover; }

        #gesture-dock {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 10; display: flex; gap: 12px; padding: 12px 24px;
            flex-wrap: wrap; justify-content: center; max-width: 90vw;
        }
        
        .gesture-item { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.05em; display: flex; align-items: center; gap: 6px; }
        .gesture-icon { font-size: 16px; background: rgba(255,255,255,0.1); padding: 4px; border-radius: 8px; }

        #time-frozen {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 48px; font-weight: 900; color: #fff; letter-spacing: 0.2em;
            text-shadow: 0 0 30px #00ffff; opacity: 0; pointer-events: none; z-index: 50;
            transition: opacity 0.3s;
        }
        #time-frozen.show { opacity: 0.8; }

        #hand-cursor {
            position: fixed; width: 32px; height: 32px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.9); pointer-events: none; z-index: 20;
            transform: translate(-50%, -50%); transition: all 0.1s; mix-blend-mode: screen;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="overlay">
    <div class="loader-ring"></div>
    <div style="font-size: 13px; font-weight: 600; letter-spacing: 0.2em; color: gray;">АКТИВАЦИЯ НЕЙРОСЕТИ...</div>
</div>

<div id="time-frozen">TIME FROZEN</div>
<div id="canvas-container"></div>

<div id="hud">
    <div id="hud-left" class="glass-panel"><div id="shape-name">ХАОС</div></div>
    <div id="hud-right" class="glass-panel">
        <div class="stats"><span id="fps-counter">60</span> FPS</div>
        <div class="stats"><span id="p-count">0</span> ЧАСТИЦ</div>
        <button id="audio-btn">🎤 AUDIO REACT</button>
    </div>
</div>

<div id="hand-cursor"></div>

<div id="cam-preview"><video id="video-el" autoplay playsinline muted></video></div>

<div id="gesture-dock" class="glass-panel">
    <div class="gesture-item"><span class="gesture-icon">🤏</span> ФОРМА (Указ+Большой)</div>
    <div class="gesture-item"><span class="gesture-icon">🫰</span> ЦВЕТ (Средн+Большой)</div>
    <div class="gesture-item"><span class="gesture-icon">✌️</span> ПАУЗА (Два пальца)</div>
    <div class="gesture-item"><span class="gesture-icon">✊</span> ВЗРЫВ (Кулак)</div>
</div>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ============================================================
// КОНФИГУРАЦИЯ И СТЕЙТ
// ============================================================
const CONFIG = {
    PARTICLE_COUNT: window.innerWidth < 768 ? 3000 : 7000,
    LERP_MORPH: 0.05,
    PINCH_THRESHOLD: 0.25, 
    FIST_THRESHOLD: 1.1, 
    COOLDOWN: 800,
    REPULSION_RADIUS: 4.5,
    REPULSION_FORCE: 8.0,
};

let targetPosY = 0, currentScale = 1, targetScale = 1;
const targetHandWorldPos = new THREE.Vector3(999, 999, 999);
const handWorldPos = new THREE.Vector3(999, 999, 999);
let isRepelling = false, isExploding = false, isFrozen = false;
let rotX = 0, rotY = 0;

// Аудио Анализатор
let audioCtx, analyser, dataArray;
let isAudioActive = false;
let audioBassIntencity = 0;

document.getElementById('audio-btn').addEventListener('click', async (e) => {
    if (isAudioActive) return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        isAudioActive = true;
        e.target.classList.add('active');
        e.target.innerText = '🔊 СИНХРОНИЗИРОВАНО';
    } catch(err) { alert("Ошибка доступа к микрофону!"); }
});

// ============================================================
// ГЕНЕРАЦИЯ ТЕКСТА (Offscreen Canvas)
// ============================================================
function genTextShape(text, n) {
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'black'; ctx.fillRect(0,0,256,128);
    ctx.fillStyle = 'white'; ctx.font = 'bold 60px Inter';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(text, 128, 64);
    
    const imgData = ctx.getImageData(0,0,256,128).data;
    const points = [];
    for(let y = 0; y < 128; y += 2) {
        for(let x = 0; x < 256; x += 2) {
            if(imgData[(y*256+x)*4] > 128) {
                points.push({x: (x-128)*0.06, y: -(y-64)*0.06});
            }
        }
    }
    
    const a = new Float32Array(n * 3);
    for(let i=0; i<n; i++) {
        const p = points[i % points.length];
        a[i*3] = p.x + (Math.random()-0.5)*0.2;
        a[i*3+1] = p.y + (Math.random()-0.5)*0.2;
        a[i*3+2] = (Math.random()-0.5)*0.8;
    }
    return a;
}

// ============================================================
// ГЕНЕРАТОРЫ ФОРМ
// ============================================================
const SHAPES = [
    { name: 'ХАОС', gen: (n) => { const a=new Float32Array(n*3); for(let i=0;i<n*3;i++) a[i]=(Math.random()-0.5)*20; return a; } },
    { name: 'ТОРУС', gen: (n) => { const a=new Float32Array(n*3); for(let i=0;i<n;i++){ const u=Math.random()*Math.PI*2, v=Math.random()*Math.PI*2; a[i*3]=(4+1.5*Math.cos(v))*Math.cos(u); a[i*3+1]=(4+1.5*Math.cos(v))*Math.sin(u); a[i*3+2]=1.5*Math.sin(v); } return a; } },
    { name: 'CYBER', gen: (n) => genTextShape('CYBER', n) },
    { name: 'ДНК', gen: (n) => { const a=new Float32Array(n*3); for(let i=0;i<n;i++){ const t=(i/n)*Math.PI*10, st=i%2; a[i*3]=Math.cos(t+st*Math.PI)*2; a[i*3+1]=(t/(Math.PI*10))*14-7; a[i*3+2]=Math.sin(t+st*Math.PI)*2; } return a; } }
];

const COLORS = [0x00ffff, 0xff00ff, 0x00ff88, 0xffaa00, 0xff2244];
let currentShape = 0, currentColor = 0;

// ============================================================
// THREE.JS SETUP & POST-PROCESSING
// ============================================================
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020202, 0.02);
const camThree = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camThree.position.z = window.innerWidth < 768 ? 14 : 10;

const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ReinhardToneMapping;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Post-Processing (Bloom)
const renderScene = new RenderPass(scene, camThree);
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.4, 0.85);
bloomPass.threshold = 0;
bloomPass.strength = 1.2; // Сила неонового свечения
bloomPass.radius = 0.5;

const composer = new EffectComposer(renderer);
composer.addPass(renderScene);
composer.addPass(bloomPass);

// Частицы
function createTex() {
    const canvas = document.createElement('canvas'); canvas.width = 32; canvas.height = 32;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createRadialGradient(16,16,0,16,16,16);
    grad.addColorStop(0,'rgba(255,255,255,1)'); grad.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = grad; ctx.fillRect(0,0,32,32); return new THREE.CanvasTexture(canvas);
}

const N = CONFIG.PARTICLE_COUNT;
document.getElementById('p-count').textContent = N;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(N * 3);
const col = new Float32Array(N * 3);
const target = new Float32Array(N * 3);
const velocity = new Float32Array(N * 3);

const initPos = SHAPES[0].gen(N);
for (let i = 0; i < pos.length; i++) { pos[i] = initPos[i]; target[i] = initPos[i]; }

geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

function updateColors() {
    const c = new THREE.Color(COLORS[currentColor]);
    for (let i = 0; i < N; i++) {
        const mix = 0.5 + Math.random() * 0.5;
        col[i*3] = c.r * mix; col[i*3+1] = c.g * mix; col[i*3+2] = c.b * mix;
    }
    geo.attributes.color.needsUpdate = true;
    
    // Обновление UI
    const shape = SHAPES[currentShape];
    const nameEl = document.getElementById('shape-name');
    nameEl.textContent = shape.name;
    nameEl.style.color = `#${c.getHexString()}`;
    nameEl.style.textShadow = `0 0 20px ${nameEl.style.color}`;
}
updateColors();

const mat = new THREE.PointsMaterial({
    size: 0.25, map: createTex(), vertexColors: true, 
    transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false
});
const particles = new THREE.Points(geo, mat);
scene.add(particles);

function applyShape() {
    const s = SHAPES[currentShape].gen(N);
    for (let i = 0; i < target.length; i++) target[i] = s[i];
    updateColors();
}

// ============================================================
// MEDIAPIPE GESTURE AI
// ============================================================
function getDist(p1, p2) { return Math.sqrt((p1.x-p2.x)**2 + (p1.y-p2.y)**2 + (p1.z-p2.z)**2); }

let lastAction = 0;
const handCursor = document.getElementById('hand-cursor');
let handDetected = false;

const handsMP = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
handsMP.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });

handsMP.onResults(results => {
    document.getElementById('overlay').classList.add('hidden');
    
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        handDetected = false; isRepelling = false; handCursor.style.opacity = '0'; return;
    }

    handDetected = true;
    const lm = results.multiHandLandmarks[0]; 
    const size = getDist(lm[0], lm[9]);

    const nx = (1 - lm[9].x - 0.5) * 2, ny = -(lm[9].y - 0.5) * 2;
    rotX = ny * 2; rotY = nx * 2; targetPosY = ny * 6; 

    handCursor.style.left = ((1 - lm[9].x) * innerWidth) + 'px';
    handCursor.style.top = (lm[9].y * innerHeight) + 'px';
    handCursor.style.opacity = '1';

    const vec = new THREE.Vector3(nx, ny, 0.5).unproject(camThree);
    const dir = vec.sub(camThree.position).normalize();
    targetHandWorldPos.copy(camThree.position).add(dir.multiplyScalar(-camThree.position.z / dir.z));

    const now = Date.now();
    const isCooldown = (now - lastAction < CONFIG.COOLDOWN);

    // Логика жестов
    const pinchDist = getDist(lm[4], lm[8]) / size; // Указательный + Большой
    const snapDist = getDist(lm[4], lm[12]) / size; // Средний + Большой
    
    // Peace ✌️ (Указательный и средний вытянуты, остальные согнуты)
    const peace = (lm[8].y < lm[6].y && lm[12].y < lm[10].y && lm[16].y > lm[14].y && lm[20].y > lm[18].y);
    
    const fist = (getDist(lm[8], lm[0])/size < 1.1 && getDist(lm[12], lm[0])/size < 1.1 && getDist(lm[16], lm[0])/size < 1.1);

    isFrozen = peace;
    document.getElementById('time-frozen').classList.toggle('show', isFrozen);

    if (!isCooldown) {
        if (pinchDist < CONFIG.PINCH_THRESHOLD) { // Смена формы
            currentShape = (currentShape + 1) % SHAPES.length; applyShape(); lastAction = now;
        } else if (snapDist < CONFIG.PINCH_THRESHOLD) { // Смена цвета
            currentColor = (currentColor + 1) % COLORS.length; updateColors(); lastAction = now;
        } else if (fist) { // Взрыв
            triggerExplosion(); lastAction = now;
        }
    }

    isRepelling = (!peace && !fist && pinchDist > CONFIG.PINCH_THRESHOLD);
});

async function startCam() {
    try {
        const cameraMP = new Camera(document.getElementById('video-el'), {
            onFrame: async () => { await handsMP.send({ image: document.getElementById('video-el') }); },
            width: 640, height: 480
        });
        cameraMP.start();
    } catch(e) { alert("Включите камеру для работы магии!"); }
}
startCam();

function triggerExplosion() {
    isExploding = true;
    for (let i = 0; i < N; i++) {
        const angle = Math.random() * Math.PI * 2, elev = (Math.random()-0.5) * Math.PI;
        const speed = 3.0 + Math.random() * 4.0; 
        velocity[i*3] = Math.cos(angle)*Math.cos(elev)*speed;
        velocity[i*3+1] = Math.sin(elev)*speed;
        velocity[i*3+2] = Math.sin(angle)*Math.cos(elev)*speed;
    }
    setTimeout(() => { isExploding = false; applyShape(); }, 1200);
}

// ============================================================
// АНИМАЦИЯ (Рендер, Векторные поля, Аудио-визуал)
// ============================================================
const clock = new THREE.Clock();
let frames = 0, fpsTime = 0;

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const time = clock.getElapsedTime();

    frames++; fpsTime += delta;
    if (fpsTime >= 1) { document.getElementById('fps-counter').textContent = frames; frames = 0; fpsTime = 0; }

    // Аудио Анализ
    if (isAudioActive && analyser) {
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for(let i=0; i<30; i++) sum += dataArray[i]; // Берем басы
        audioBassIntencity = sum / 30 / 255; // 0.0 - 1.0
        bloomPass.strength = 1.2 + audioBassIntencity * 2.5; // Свечение пульсирует
        targetScale = 1.0 + audioBassIntencity * 0.4;
    }

    if (isFrozen) { composer.render(); return; } // Заморозка времени

    handWorldPos.lerp(targetHandWorldPos, 0.2);
    particles.rotation.x += (rotX - particles.rotation.x) * 0.05;
    particles.rotation.y += (rotY - particles.rotation.y) * 0.05;
    particles.rotation.z = time * 0.05;

    currentScale += (targetScale - currentScale) * 0.1;
    particles.scale.set(currentScale, currentScale, currentScale);

    const pArr = geo.attributes.position.array;
    const locHand = particles.worldToLocal(handWorldPos.clone());
    
    for (let i = 0; i < N; i++) {
        const idx = i * 3;
        if (isExploding) {
            pArr[idx] += velocity[idx] * delta * 15;
            pArr[idx+1] += velocity[idx+1] * delta * 15;
            pArr[idx+2] += velocity[idx+2] * delta * 15;
            velocity[idx] *= 0.9; velocity[idx+1] *= 0.9; velocity[idx+2] *= 0.9;
            continue;
        }

        let tx = target[idx], ty = target[idx+1], tz = target[idx+2];

        // Flow Fields (Математическая симуляция потоков / шума)
        if (currentShape === 0) { // Только в Хаосе
            tx += Math.sin(ty * 0.5 + time) * 2.0;
            ty += Math.cos(tx * 0.5 + time) * 2.0;
        }

        // Отталкивание от руки с учетом гидродинамики (завихрения)
        if (isRepelling) {
            const dx = pArr[idx] - locHand.x, dy = pArr[idx+1] - locHand.y, dz = pArr[idx+2] - locHand.z;
            const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
            if (dist < CONFIG.REPULSION_RADIUS) {
                const force = (CONFIG.REPULSION_RADIUS - dist) / CONFIG.REPULSION_RADIUS;
                // Добавляем эффект закручивания (cross product)
                tx += (dx/dist + dy*0.5) * force * CONFIG.REPULSION_FORCE;
                ty += (dy/dist - dx*0.5) * force * CONFIG.REPULSION_FORCE;
                tz += (dz/dist) * force * CONFIG.REPULSION_FORCE;
            }
        }

        pArr[idx] += (tx - pArr[idx]) * CONFIG.LERP_MORPH;
        pArr[idx+1] += (ty - pArr[idx+1]) * CONFIG.LERP_MORPH;
        pArr[idx+2] += (tz - pArr[idx+2]) * CONFIG.LERP_MORPH;
    }
    
    geo.attributes.position.needsUpdate = true;
    composer.render(); // Используем composer вместо renderer.render
}

animate();

window.addEventListener('resize', () => {
    camThree.aspect = innerWidth / innerHeight; camThree.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
